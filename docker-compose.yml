version: "3.9"

services:

  mongodb:

    image: mongo:7

    container_name: mongodb

    restart: unless-stopped

    ports:
      - "${MONGO_PORT}:27017"

    volumes:
      - mongodb-data:/data/db

    networks:
      - todo-network

    healthcheck:

      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]

      interval: 20s

      timeout: 10s

      retries: 5

      start_period: 30s


  backend:

    build:

      context: ./backend

    container_name: backend

    restart: unless-stopped

    env_file:

      - ./backend/.env

    ports:

      - "${BACKEND_PORT}:5000"

    depends_on:

      mongodb:

        condition: service_healthy

    networks:

      - todo-network

    healthcheck:

      test: ["CMD", "wget", "--spider", "http://localhost:5000"]

      interval: 30s

      timeout: 10s

      retries: 5

      start_period: 30s


  frontend:

    build:

      context: ./frontend

    container_name: frontend

    restart: unless-stopped

    ports:

      - "${FRONTEND_PORT}:80"

    depends_on:

      backend:

        condition: service_healthy

    networks:

      - todo-network

    healthcheck:

      test: ["CMD", "wget", "--spider", "http://localhost"]

      interval: 30s

      timeout: 10s

      retries: 5

      start_period: 30s


volumes:

  mongodb-data:


networks:

  todo-network: